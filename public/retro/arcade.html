<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>dijkman.dev — Arcade</title>
  <style>
    :root{color-scheme:dark;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0b0c;color:#eaeaea}
    header{padding:18px 20px;border-bottom:1px solid #222;display:flex;gap:12px;flex-wrap:wrap;align-items:baseline}
    header h1{margin:0;font-size:18px}
    header .meta{color:#a7a7a7;font-size:13px}
    main{padding:18px 20px;max-width:1100px;margin:0 auto}
    .frame{border:1px solid #222;border-radius:14px;overflow:hidden;background:#111}
    #game{width:100%;height:70vh;min-height:420px}
    .hint{margin-top:10px;color:#a7a7a7;font-size:13px;line-height:1.4}
    .status{margin-top:8px;font-size:13px;color:#9ee9be}
    code{background:#151515;border:1px solid #222;padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
<header>
  <h1>Arcade</h1>
  <div class="meta">EmulatorJS • SNES autoload</div>
</header>

<main>
  <div class="frame"><div id="game"></div></div>
  <div class="hint">
    Primair: <code>roms/SureInstinct.sfc</code> • fallback: <code>/roms/gridlee.zip</code>
  </div>
  <div id="status" class="status" aria-live="polite"></div>
</main>

<script>
  const primaryRom = "roms/SureInstinct.sfc";
  const fallbackRom = "/roms/gridlee.zip";
  const statusEl = document.getElementById("status");

  window.EJS_player = "#game";
  window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
  window.EJS_startOnLoaded = true;

  function setGame(rom, core, label) {
    window.EJS_gameUrl = rom;
    window.EJS_core = core;
    statusEl.textContent = label;
  }

  fetch(primaryRom, { method: "HEAD" })
    .then((response) => {
      if (response.ok) {
        setGame(primaryRom, "snes", "SureInstinct gevonden — SNES autoload actief.");
      } else {
        setGame(fallbackRom, "arcade", "SureInstinct niet gevonden — fallback naar Gridlee.");
      }
    })
    .catch(() => {
      setGame(fallbackRom, "arcade", "ROM-check mislukt — fallback naar Gridlee.");
    })
    .finally(() => {
      const loader = document.createElement("script");
      loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
      document.body.appendChild(loader);
    });
</script>
</body>
</html>
